<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH IS SKIN</title>
    <!-- p5.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <!-- p5.webserial Library -->
    <script src="https://unpkg.com/@gohai/p5.webserial@latest/libraries/p5.webserial.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* Dark, near sparkly smoke */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }

        /* Scrolling Banner */
        #banner-container {
            position: absolute;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95); /* Pure White */
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            overflow: hidden;
            z-index: 1000;
            white-space: nowrap;
            padding: 12px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        #banner-text {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 45s linear infinite;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #a8a9ad; /* Metallic Silver */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        @keyframes scroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Status Key (Bottom Left) */
        #status-key {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.9); /* Match Banner White */
            padding: 15px;
            border-left: 3px solid #a8a9ad; /* Match Banner Silver */
            font-size: 11px;
            color: #888; /* Silver-grey text */
            pointer-events: none;
            line-height: 1.6;
            z-index: 1000;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .status-val { color: #444; font-weight: bold; }

        /* Connection Button Overlay */
        #ui-overlay {
            position: absolute;
            z-index: 2000;
        }
        #connect-btn {
            background: transparent;
            border: 1px solid #666;
            color: #fff;
            padding: 15px 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }
        #connect-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }
    </style>
</head>
<body>
    <div id="banner-container">
        <div id="banner-text">
            Inspired by Legacy Russell's Glitch Feminism chapter Glitch is Skin… a rupture or break in surface and position simulates tension, becoming portal and passageway toward a truer self
        </div>
    </div>

    <div id="ui-overlay">
        <button id="connect-btn">INITIATE CONNECTION [SERIAL]</button>
    </div>

    <div id="status-key">
        <div>ASSET: <span id="stat-image" class="status-val">LOADING...</span></div>
        <div>JOYSTICK XY: <span id="stat-joy" class="status-val">0, 0</span></div>
        <div>SKIN STATE: <span id="stat-state" class="status-val">COHERENT</span></div>
        <div>SERIAL: <span id="stat-serial" class="status-val">IDLE</span></div>
    </div>

    <script src="backgroundManager.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
